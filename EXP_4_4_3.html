<h3>EXP_4_4_3.html</h3>

<div class="editor">
<pre id="lineNumbers"></pre>
<textarea id="code" wrap="off">import matplotlib
matplotlib.use("Agg")

import matplotlib.pyplot as plt
plt.rcParams.update({
    'figure.facecolor': 'white',
    'axes.facecolor': 'white',
})

import numpy as np

from scipy.integrate import solve_ivp

# Constants
m = 0.5  # mass of marble (kg)
I0 = 21.32  # moment of inertia of tube (kg m^2)
ri = 7.76  # initial radius (m)
omega_i = 0.214  # initial angular velocity (rad/s)

# Initial angular momentum (conserved)
L = (I0 + m * ri**2) * omega_i

# Equation of motion: d^2r/dt^2 = L^2 * r / (I0 + m r^2)^2
def radial_eq(t, y):
    r, drdt = y
    d2rdt2 = (L**2 * r) / ((I0 + m * r**2)**2)
    return [drdt, d2rdt2]

# Initial conditions: r(0) = ri, dr/dt = 0
y0 = [ri, 0.]

# Time span and evaluation points
t_span = (0, 10)
t_eval = np.linspace(t_span[0], t_span[1], 500)

# Solve ODE
sol = solve_ivp(radial_eq, t_span, y0, t_eval=t_eval, rtol=1e-9, atol=1e-9)

# Extract results
t = sol.t
r = sol.y[0]
drdt = sol.y[1]
omega = L / (I0 + m * r**2)
v_tangent = r * omega
v_total = np.sqrt(drdt**2 + v_tangent**2)

# Plotting
plt.figure(figsize=(12, 8))

plt.subplot(3, 1, 1)
plt.plot(t, r)
plt.ylabel('Radius r(t) [m]')
plt.title('Marble Sliding Inside Rotating Tube')
plt.grid(True)

plt.subplot(3, 1, 2)
plt.plot(t, drdt, label='Radial Speed $\dot{r}$')
plt.plot(t, v_tangent, label='Tangential Speed $r \\omega$')
plt.ylabel('Speed [m/s]')
plt.legend()
plt.grid(True)

plt.subplot(3, 1, 3)
plt.plot(t, v_total, label='Total Speed $|\mathbf{v}|$', color='purple')
plt.xlabel('Time [s]')
plt.ylabel('Total Speed [m/s]')
plt.legend()
plt.grid(True)


plt.tight_layout()
plt.show()
</textarea>
</div>

<button onclick="runCode()">Run</button>
<button onclick="savePlot('png')">Save PNG</button>
<button onclick="savePlot('svg')">Save SVG</button>
<button onclick="savePlot('pdf')">Save PDF</button>

<div id="output"></div>
<div id="plot"></div>

<script>
let pyodideReady = loadPyodide();
let pyodide;

const codeEl = document.getElementById("code");
const lineNumbers = document.getElementById("lineNumbers");

function updateLineNumbers() {
    const lines = codeEl.value.split("\n").length;
    let nums = "";
    for (let i = 1; i <= lines; i++) nums += i + "\n";
    lineNumbers.textContent = nums;
}

codeEl.addEventListener("input", updateLineNumbers);
codeEl.addEventListener("scroll", () => lineNumbers.scrollTop = codeEl.scrollTop);
updateLineNumbers();

async function runCode() {
    pyodide = await pyodideReady;
    document.getElementById("output").innerText = "Running...";

    await pyodide.loadPackage(["numpy", "matplotlib", "scipy"]);

    try {
        await pyodide.runPythonAsync(`
import sys
from io import StringIO
sys.stdout = StringIO()
`);

        await pyodide.runPythonAsync(codeEl.value);

        let out = await pyodide.runPythonAsync("sys.stdout.getvalue()");
        document.getElementById("output").innerText = out;

        const img = await pyodide.runPythonAsync(`
import base64
from io import BytesIO
buf = BytesIO()
plt.savefig(buf, format="png")
buf.seek(0)
base64.b64encode(buf.read()).decode()
`);

        document.getElementById("plot").innerHTML =
            "<img id='plotImage' src='data:image/png;base64," + img + "'/>";

    } catch(err) {
        document.getElementById("output").innerText = err;
    }
}

function savePlot(format) {
    const img = document.getElementById("plotImage");
    if (!img) return;
    const link = document.createElement('a');
    link.href = img.src;
    link.download = "plot." + format;
    link.click();
}
</script>

</body>
