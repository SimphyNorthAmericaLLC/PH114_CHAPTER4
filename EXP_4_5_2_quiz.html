
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EXP_4_5_2_quiz</title>
<style>
body {
    background-color: #1e1e1e;
    color: white;
    font-family: Arial, sans-serif;
}
.container {
    width: 650px;
    margin: auto;
}
.question {
    margin-bottom: 20px;
}
button {
    padding: 6px 12px;
    margin-top: 5px;
}
.correct { color: #00ff88; }
.incorrect { color: #ff5555; }
</style>
</head>
<body>
<div class="container">
<h2>EXP_4_5_2 Quiz</h2>
<div id="quiz"></div>
<div id="score"></div>
</div>

<script>
const questions = [
{
q: "Substituting back and solve for u₀ we get",
options: [
"u₀ = sqrt(2GMR / (d² - R²))",
"u₀ = sqrt(GMR / (d² - R²))",
"u₀ = sqrt(2GMR / (d - R))",
"u₀ = sqrt(2GM / (d - R))"
],
answer: 0
},
{
q: "The distance “d” from above in Simphy is",
options: ["1.23 m","2.23 m","3.23 m","4.23 m"],
answer: 1
},
{
q: "The speed such that the comet grazes the planet is calculated about",
options: ["9.25 m/s","9.55 m/s","9.45 m/s","9.35 m/s"],
answer: 0
},
{
q: "Does the horizontal distance between the asteroid and the planet play any role?",
options: [
"Yes of course, the closer the more initial gravitational energy we need to account for in the theoretical solution",
"No, the initial gravitation energy will not be considered even it is closer since angular momentum is conserved",
"No, the initial gravitation energy will not be considered even it is closer since the comet is very fast"
],
answer: 0
}
];

let score = 0;
let answered = 0;

function shuffle(array){
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function loadQuiz(){
    const quizDiv = document.getElementById("quiz");
    questions.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "question";
        const q = document.createElement("p");
        q.textContent = (index+1) + ". " + item.q;
        div.appendChild(q);

        let opts = item.options.map((opt,i)=>({text:opt, correct:i===item.answer}));
        shuffle(opts);

        opts.forEach(opt=>{
            const btn = document.createElement("button");
            btn.textContent = opt.text;
            btn.onclick = function(){
                if(btn.disabled) return;
                answered++;
                if(opt.correct){
                    btn.className="correct";
                    score++;
                } else {
                    btn.className="incorrect";
                }
                div.querySelectorAll("button").forEach(b=>b.disabled=true);
                if(answered===questions.length){
                    document.getElementById("score").innerHTML = 
                        "<h3>Final Score: " + score + " / " + questions.length + "</h3>";
                }
            };
            div.appendChild(btn);
            div.appendChild(document.createElement("br"));
        });

        quizDiv.appendChild(div);
    });
}

loadQuiz();
</script>

</body>
</html>
