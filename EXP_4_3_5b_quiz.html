<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EXP_4_3_5b_quiz.html</title>
<style>
body {
    background-color: #1e1e1e;
    color: white;
    font-family: Arial, sans-serif;
}
.container {
    width: 650px;
    margin: 40px auto;
    background: #222;
    padding: 20px;
    border-radius: 8px;
}
.question { margin-bottom: 12px; font-weight: bold; }
.option { margin: 5px 0; }
.feedback { margin-top: 5px; font-weight: bold; }
.correct { color: #00ff88; }
.incorrect { color: #ff4c4c; }
</style>
</head>
<body>
<div class="container">
<div id="quiz"></div>
<div id="finalScore" style="margin-top:20px; font-weight:bold;"></div>
</div>

<script>
const questions = [{"question": "Solving the common speed u when m\u2082 lands and substituting I = (1/2)MR\u00b2, we get:", "options": [{"text": "u = sqrt(2gh(m\u2082 - m\u2081) / (m\u2081 + m\u2082 + M/2))", "correct": true}, {"text": "u = sqrt(gh(m\u2082 - m\u2081) / (m\u2081 + m\u2082 + M/2))", "correct": false}, {"text": "u = sqrt(2gh(m\u2082 - m\u2081) / (m\u2081 + m\u2082 + M))", "correct": false}, {"text": "u = sqrt(2gh(m\u2082 - m\u2081) / (m\u2081 + m\u2082))", "correct": false}]}, {"question": "From Simphy we can also glean that the height is about:", "options": [{"text": "3.62 m", "correct": true}, {"text": "4.62 m", "correct": false}, {"text": "2.62 m", "correct": false}, {"text": "None of these apply", "correct": false}]}, {"question": "Given m\u2081 = 5 kg, m\u2082 = 8 kg, M = 1 kg, R = 0.63 m, the landing speed is about:", "options": [{"text": "~ 3.97 m/s", "correct": true}, {"text": "~ 3.87 m/s", "correct": false}, {"text": "~ 4.05 m/s", "correct": false}, {"text": "~ 4.5 m/s", "correct": false}]}, {"question": "Given the non-slip condition, during the time that the mass on the right lands, the pulley has an angular speed of about:", "options": [{"text": "~ 6.28 rad/s", "correct": true}, {"text": "~ 6.18 rad/s", "correct": false}, {"text": "~ 6.38 rad/s", "correct": false}, {"text": "~ 6.48 rad/s", "correct": false}]}, {"question": "We can also confirm the landing speed without considering energy, using the kinematic equation v\u00b2 = 2aS and known height. The result is:", "options": [{"text": "~ 3.97 m/s", "correct": true}, {"text": "~ 3.87 m/s", "correct": false}, {"text": "~ 4.05 m/s", "correct": false}, {"text": "~ 4.5 m/s", "correct": false}]}];

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function renderQuiz() {
    const quizDiv = document.getElementById("quiz");
    quizDiv.innerHTML = "";

    questions.forEach((q, index) => {
        shuffle(q.options);
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        const qBlock = document.createElement("div");

        const qTitle = document.createElement("div");
        qTitle.className = "question";
        qTitle.innerHTML = (index+1) + ". " + q.question;
        qBlock.appendChild(qTitle);

        q.options.forEach((opt, i) => {
            const optDiv = document.createElement("div");
            optDiv.className = "option";
            optDiv.innerHTML = `
                <label>
                    <input type="radio" name="q${index}" onclick="checkAnswer(${index}, ${opt.correct})">
                    ${letters[i]}) ${opt.text}
                </label>
            `;
            qBlock.appendChild(optDiv);
        });

        const feedbackDiv = document.createElement("div");
        feedbackDiv.id = "feedback" + index;
        feedbackDiv.className = "feedback";
        qBlock.appendChild(feedbackDiv);

        quizDiv.appendChild(qBlock);
    });
}

let score = 0;
let answered = new Array(questions.length).fill(false);

function checkAnswer(qIndex, isCorrect) {
    const feedback = document.getElementById("feedback" + qIndex);

    if (!answered[qIndex]) {
        answered[qIndex] = true;

        if (isCorrect) {
            feedback.innerHTML = "✅ Correct!";
            feedback.className = "feedback correct";
            score++;
        } else {
            feedback.innerHTML = "❌ Incorrect.";
            feedback.className = "feedback incorrect";
        }
    }

    if (answered.every(a => a)) {
        document.getElementById("finalScore").innerHTML =
            "Final Score: " + score + " / " + questions.length;
    }
}

renderQuiz();
</script>

</body>
</html>
