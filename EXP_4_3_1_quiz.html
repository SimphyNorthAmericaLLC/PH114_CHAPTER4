<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EXP_4_3_1_quiz.html</title>
<style>
body {
    background-color: #1e1e1e;
    color: white;
    font-family: Arial, sans-serif;
}
.container {
    width: 650px;
    margin: 40px auto;
    background: #222;
    padding: 20px;
    border-radius: 8px;
}
.question { margin-bottom: 12px; font-weight: bold; }
.option { margin: 5px 0; }
.feedback { margin-top: 5px; font-weight: bold; }
.correct { color: #00ff88; }
.incorrect { color: #ff4c4c; }
</style>
</head>
<body>
<div class="container">
<div id="quiz"></div>
<div id="finalScore" style="margin-top:20px; font-weight:bold;"></div>
</div>

<script>
const questions = [{"question": "The reason we sketch the weight right in the middle of the rod is", "options": [{"text": "This is the center of mass as long as the rod is uniform", "correct": true}, {"text": "it's a random choice", "correct": false}, {"text": "Because only this part of the rod has weight", "correct": false}, {"text": "None of these apply", "correct": false}]}, {"question": "As a result, the torque acting on the rod will be", "options": [{"text": "m\u00b7g\u00b7sin(\u03b8)\u00b7(L/2)", "correct": true}, {"text": "m\u00b7g\u00b7sin(\u03b8)\u00b7L", "correct": false}, {"text": "m\u00b7g\u00b7sin(\u03b8)\u00b7(L/4)", "correct": false}, {"text": "None of these apply", "correct": false}]}, {"question": "Solving for Newton\u2019s law, the angular acceleration will be", "options": [{"text": "\u03b1 = (3g/2L)\u00b7sin(\u03b8)", "correct": true}, {"text": "\u03b1 = (g/2L)\u00b7sin(\u03b8)", "correct": false}, {"text": "\u03b1 = (2g/3L)\u00b7sin(\u03b8)", "correct": false}, {"text": "\u03b1 = (3g/L)\u00b7sin(\u03b8)", "correct": false}]}, {"question": "The maximum acceleration occurs when the angle (with respect to the vertical) becomes", "options": [{"text": "90\u00b0", "correct": true}, {"text": "0\u00b0", "correct": false}, {"text": "45\u00b0", "correct": false}, {"text": "None of these apply", "correct": false}]}, {"question": "The maximum acceleration according to the theoretical derivation and Simphy\u2019s result is about", "options": [{"text": "7.4 rad/s\u00b2", "correct": true}, {"text": "6.1 rad/s\u00b2", "correct": false}, {"text": "4.1 rad/s\u00b2", "correct": false}, {"text": "5.1 rad/s\u00b2", "correct": false}]}, {"question": "Using Simphy\u2019s data, the more accurate initial angle estimate is about", "options": [{"text": "33.8\u00b0", "correct": true}, {"text": "34.8\u00b0", "correct": false}, {"text": "35.8\u00b0", "correct": false}, {"text": "None of these apply", "correct": false}]}];

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function renderQuiz() {
    const quizDiv = document.getElementById("quiz");
    quizDiv.innerHTML = "";

    questions.forEach((q, index) => {
        shuffle(q.options);
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        const qBlock = document.createElement("div");

        const qTitle = document.createElement("div");
        qTitle.className = "question";
        qTitle.innerHTML = (index+1) + ". " + q.question;
        qBlock.appendChild(qTitle);

        q.options.forEach((opt, i) => {
            const optDiv = document.createElement("div");
            optDiv.className = "option";
            optDiv.innerHTML = `
                <label>
                    <input type="radio" name="q${index}" onclick="checkAnswer(${index}, ${opt.correct})">
                    ${letters[i]}) ${opt.text}
                </label>
            `;
            qBlock.appendChild(optDiv);
        });

        const feedbackDiv = document.createElement("div");
        feedbackDiv.id = "feedback" + index;
        feedbackDiv.className = "feedback";
        qBlock.appendChild(feedbackDiv);

        quizDiv.appendChild(qBlock);
    });
}

let score = 0;
let answered = new Array(questions.length).fill(false);

function checkAnswer(qIndex, isCorrect) {
    const feedback = document.getElementById("feedback" + qIndex);

    if (!answered[qIndex]) {
        answered[qIndex] = true;

        if (isCorrect) {
            feedback.innerHTML = "✅ Correct!";
            feedback.className = "feedback correct";
            score++;
        } else {
            feedback.innerHTML = "❌ Incorrect.";
            feedback.className = "feedback incorrect";
        }
    }

    if (answered.every(a => a)) {
        document.getElementById("finalScore").innerHTML =
            "Final Score: " + score + " / " + questions.length;
    }
}

renderQuiz();
</script>

</body>
</html>
